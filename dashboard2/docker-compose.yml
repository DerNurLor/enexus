# dashboard/docker-compose.yml
# Standalone Dashboard service.
# Connects to external MongoDB + Redis (shared with Backend).
# 
# ВАЖНО: Dashboard читает те же базы данных что и Backend.
# Убедись что Backend запущен и MongoDB/Redis доступны.

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: ncfu_dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      # MongoDB — используем ту же БД что и Backend
      MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST:-mongo}:27017/${MONGO_DB:-ncfu_schedule}?authSource=admin"
      AUTH_MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST:-mongo}:27017/${AUTH_MONGO_DB:-ncfu_auth}?authSource=admin"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@${REDIS_HOST:-redis}:6379/0"
      APP_ENV: "${APP_ENV:-production}"
    ports:
      - "127.0.0.1:8003:8003"
    networks: [ncfu_net]
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8003/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

# Если запускаешь Dashboard изолированно (без общего стека),
# раскомментируй секцию ниже:
#
#  mongo:
#    image: mongo:7.0
#    ...
#  redis:
#    image: redis:7.4-alpine
#    ...

networks:
  ncfu_net:
    external: true   # подключаемся к существующей сети от backend
    name: ncfu_network
