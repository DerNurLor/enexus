# miniapp/docker-compose.yml
# Standalone compose for the miniapp service.
# Expects shared Mongo + Redis to be running (ncfu_network).
# For running all services together, use the top-level docker-compose.yml.

services:
  miniapp:
    build: { context: ., dockerfile: Dockerfile, target: runtime }
    container_name: ncfu_miniapp
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${MONGO_DB:-ncfu_schedule}?authSource=admin"
      AUTH_MONGO_URI: "mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongo:27017/${AUTH_MONGO_DB:-ncfu_auth}?authSource=admin"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379/0"
      BACKEND_URL: "${BACKEND_URL:-http://backend:8000}"
    ports:
      - "127.0.0.1:8002:8002"
    networks:
      - ncfu_net

networks:
  ncfu_net:
    external: true
    name: ncfu_network
