<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Мой профиль · NCFU</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f0ede8;
    --surface:  #ffffff;
    --border:   #e0dbd2;
    --border2:  #c8c0b4;
    --accent:   #1a1a2e;
    --accent2:  #4a3f8f;
    --accent3:  #c45c2a;
    --text:     #1a1a1a;
    --muted:    #7a7060;
    --danger:   #c0392b;
    --ok:       #27ae60;
    --warn:     #e67e22;
    --tag-bg:   #e8e4fc;
    --tag:      #4a3f8f;
    --font:     'Syne', sans-serif;
    --mono:     'IBM Plex Mono', monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg); }
  body { font-family: var(--font); color: var(--text); min-height: 100vh; }

  /* ── Auth gate ── */
  #auth-gate {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: var(--bg);
  }
  .auth-box {
    background: var(--surface); border: 2px solid var(--accent);
    border-radius: 12px; padding: 40px; width: 380px; text-align: center;
    box-shadow: 6px 6px 0 var(--accent);
  }
  .auth-box h2 { font-size: 22px; font-weight: 800; color: var(--accent); margin-bottom: 4px; letter-spacing: -.02em; }
  .auth-box p { color: var(--muted); font-size: 13px; margin-bottom: 24px; font-family: var(--mono); }

  /* ── App shell ── */
  #app { display: none; }
  .page { max-width: 860px; margin: 0 auto; padding: 32px 16px 60px; }

  /* ── Header ── */
  .page-header {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 32px; padding-bottom: 24px;
    border-bottom: 2px solid var(--border);
  }
  .avatar-wrap { position: relative; }
  .avatar-big {
    width: 72px; height: 72px; border-radius: 50%;
    object-fit: cover; border: 3px solid var(--accent);
    background: var(--border);
  }
  .avatar-placeholder-big {
    width: 72px; height: 72px; border-radius: 50%;
    border: 3px solid var(--accent); background: var(--tag-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px;
  }
  .user-info h1 { font-size: 24px; font-weight: 800; letter-spacing: -.03em; }
  .user-info .username { font-family: var(--mono); font-size: 12px; color: var(--muted); margin-top: 2px; }
  .user-info .joined  { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 6px; }
  .header-right { margin-left: auto; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }

  /* ── Badges / tags ── */
  .tag {
    display: inline-block; padding: 3px 10px; border-radius: 4px;
    font-size: 11px; font-weight: 600; font-family: var(--mono);
    background: var(--tag-bg); color: var(--tag); border: 1px solid var(--tag);
  }
  .tag.danger { background: #fce8e8; color: var(--danger); border-color: var(--danger); }
  .tag.ok     { background: #e8fce8; color: var(--ok);     border-color: var(--ok); }
  .tag.warn   { background: #fef3e8; color: var(--warn);   border-color: var(--warn); }

  /* ── Sections ── */
  .section { margin-bottom: 28px; }
  .section-title {
    font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 12px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  /* ── Cards ── */
  .card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 18px;
  }
  .card + .card { margin-top: 10px; }

  /* ── API key cards ── */
  .key-card {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    display: flex; align-items: center; gap: 14px;
    margin-bottom: 8px; transition: border-color .15s;
  }
  .key-card:hover { border-color: var(--border2); }
  .key-icon { font-size: 20px; flex-shrink: 0; }
  .key-info { flex: 1; min-width: 0; }
  .key-name { font-weight: 700; font-size: 14px; }
  .key-prefix { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 2px; }
  .key-meta { font-family: var(--mono); font-size: 11px; color: var(--muted); margin-top: 4px; }
  .key-actions { display: flex; gap: 6px; flex-shrink: 0; }

  /* ── New key reveal ── */
  .key-reveal {
    background: #f0f8ec; border: 1.5px solid var(--ok);
    border-radius: 8px; padding: 14px; margin-bottom: 12px;
  }
  .key-reveal .label { font-size: 11px; color: var(--ok); font-weight: 700; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .08em; }
  .key-reveal code { font-family: var(--mono); font-size: 12px; word-break: break-all; color: var(--text); }
  .key-reveal .copy-btn { margin-top: 8px; }

  /* ── Activity log ── */
  .act-row {
    display: flex; align-items: baseline; gap: 10px;
    padding: 7px 0; border-bottom: 1px solid var(--border);
    font-family: var(--mono); font-size: 11px;
  }
  .act-row:last-child { border-bottom: none; }
  .act-ts   { color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .act-name { font-weight: 500; color: var(--accent2); min-width: 120px; }
  .act-detail { color: var(--muted); font-size: 10px; word-break: break-all; }

  /* ── Inputs & Buttons ── */
  input, select {
    font-family: var(--mono); font-size: 12px;
    padding: 8px 12px; border: 1.5px solid var(--border);
    border-radius: 6px; background: var(--surface); color: var(--text);
    outline: none; transition: border-color .15s; width: 100%;
  }
  input:focus, select:focus { border-color: var(--accent); }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 5px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  button {
    font-family: var(--font); font-size: 12px; font-weight: 700;
    padding: 8px 18px; border-radius: 6px; border: 2px solid var(--accent);
    background: var(--accent); color: #fff; cursor: pointer;
    transition: all .15s; letter-spacing: .02em;
  }
  button:hover { filter: brightness(1.1); }
  .btn-outline { background: transparent; color: var(--accent); }
  .btn-outline:hover { background: var(--accent); color: #fff; }
  .btn-danger-outline { background: transparent; color: var(--danger); border-color: var(--danger); }
  .btn-danger-outline:hover { background: var(--danger); color: #fff; }
  .btn-sm { padding: 5px 12px; font-size: 11px; }
  .btn-xs { padding: 3px 9px; font-size: 10px; }
  button[disabled] { opacity: .45; cursor: default; }

  /* ── Limits bar ── */
  .limit-row { display: flex; align-items: center; gap: 12px; margin-bottom: 8px; }
  .limit-label { font-family: var(--mono); font-size: 11px; color: var(--muted); width: 140px; flex-shrink: 0; }
  .limit-bar-wrap { flex: 1; background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .limit-bar { height: 100%; background: var(--accent2); border-radius: 4px; transition: width .4s; }
  .limit-val { font-family: var(--mono); font-size: 11px; color: var(--text); width: 60px; text-align: right; flex-shrink: 0; }

  /* ── Toast ── */
  #toast {
    position: fixed; bottom: 24px; right: 24px;
    background: var(--accent); color: #fff;
    padding: 10px 18px; border-radius: 8px; font-size: 12px;
    opacity: 0; transform: translateY(10px); transition: all .25s;
    pointer-events: none; z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateY(0); }

  /* ── Spinner ── */
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty { text-align: center; padding: 28px; color: var(--muted); font-size: 12px; font-family: var(--mono); }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<!-- Auth gate -->
<div id="auth-gate">
  <div class="auth-box">
    <h2>NCFU · Мой профиль</h2>
    <p>Войдите через Telegram или вставьте токен</p>
    <div class="field" style="text-align:left">
      <label>JWT токен</label>
      <input type="password" id="token-input" placeholder="Bearer token...">
    </div>
    <button onclick="doLogin()" style="width:100%;margin-top:4px">Войти</button>
    <div id="auth-err" style="color:var(--danger);font-size:11px;margin-top:10px;font-family:var(--mono);display:none"></div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <div class="page">

    <!-- Header -->
    <div class="page-header" id="profile-header">
      <div class="spinner"></div>
    </div>

    <!-- Roles & Limits -->
    <div class="section" id="roles-section" style="display:none">
      <div class="section-title">Роли и права</div>
      <div class="card" id="roles-card"></div>
    </div>

    <!-- API Keys -->
    <div class="section" id="keys-section" style="display:none">
      <div class="section-title">API ключи</div>
      <div id="new-key-reveal"></div>
      <div id="keys-list"></div>
      <button class="btn-outline btn-sm" style="margin-top:10px" onclick="showNewKeyForm()">+ Создать ключ</button>
      <div id="new-key-form" style="display:none;margin-top:14px">
        <div class="card">
          <div class="form-row">
            <div class="field"><label>Название</label><input id="nk-name" placeholder="my-app"></div>
            <div class="field"><label>RPM лимит</label><input id="nk-rpm" type="number" value="60"></div>
          </div>
          <div class="form-row">
            <div class="field"><label>Срок (дней, пусто = бессрочно)</label><input id="nk-days" type="number" placeholder="365"></div>
            <div class="field"><label>Права (через запятую)</label><input id="nk-perms" placeholder="schedule:read"></div>
          </div>
          <div style="display:flex;gap:8px;margin-top:4px">
            <button onclick="createKey()">Создать</button>
            <button class="btn-outline" onclick="hideNewKeyForm()">Отмена</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Activity -->
    <div class="section" id="activity-section" style="display:none">
      <div class="section-title">Последняя активность</div>
      <div class="card" id="activity-list"></div>
    </div>

  </div>
</div>

<div id="toast"></div>

<script>
let TOKEN = localStorage.getItem('me_token') || '';
let myData = null;

// ── Auth ───────────────────────────────────────────────────────────────────
async function doLogin() {
  const raw = document.getElementById('token-input').value.trim();
  const tok = raw.startsWith('Bearer ') ? raw.slice(7) : raw;
  const err = document.getElementById('auth-err');
  err.style.display = 'none';
  try {
    await apiFetch('/dashboard/api/me', {}, tok);
    TOKEN = tok;
    localStorage.setItem('me_token', TOKEN);
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadProfile();
  } catch(e) {
    err.textContent = e.message; err.style.display = 'block';
  }
}

async function checkAutoLogin() {
  if (!TOKEN) return;
  try {
    await apiFetch('/dashboard/api/me');
    document.getElementById('auth-gate').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    loadProfile();
  } catch(e) { TOKEN = ''; localStorage.removeItem('me_token'); }
}

async function apiFetch(url, opts={}, tok=TOKEN) {
  const r = await fetch(url, {
    ...opts,
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tok, ...(opts.headers||{}) }
  });
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  if (r.status === 204) return null;
  return r.json();
}

// ── Profile ────────────────────────────────────────────────────────────────
async function loadProfile() {
  const d = await apiFetch('/dashboard/api/me');
  myData = d;
  const u = d.user;

  // Header
  const isBlocked = u.is_blocked;
  document.getElementById('profile-header').innerHTML = `
    <div class="avatar-wrap">
      ${u.avatar
        ? `<img class="avatar-big" src="${u.avatar}" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
        : ''}
      <div class="avatar-placeholder-big" ${u.avatar ? 'style="display:none"' : ''}>👤</div>
    </div>
    <div class="user-info">
      <h1>${esc(u.display || u.first_name)}</h1>
      <div class="username">${u.username ? '@'+esc(u.username) : 'Без username'} &nbsp;·&nbsp; tg:${u.tg_id}</div>
      <div class="joined">С нами с ${fmtDate(u.created_at)}</div>
    </div>
    <div class="header-right">
      ${isBlocked ? '<span class="tag danger">⛔ Заблокирован</span>' : '<span class="tag ok">✓ Активен</span>'}
      <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">Последний вход<br>${fmtDateFull(u.last_active)}</span>
    </div>`;

  // Roles
  document.getElementById('roles-section').style.display = '';
  const allPerms = new Set();
  document.getElementById('roles-card').innerHTML = `
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">
      ${u.roles.map(r => `<span class="tag">${esc(r)}</span>`).join('')}
    </div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--muted)">
      Ваши роли определяют доступ к API. Для изменения ролей обратитесь к администратору.
    </div>`;

  // Keys
  document.getElementById('keys-section').style.display = '';
  renderKeys(d.keys);

  // Activity
  document.getElementById('activity-section').style.display = '';
  renderActivity(d.activity);
}

function renderKeys(keys) {
  const el = document.getElementById('keys-list');
  if (!keys.length) { el.innerHTML = '<div class="empty">Нет активных ключей</div>'; return; }
  el.innerHTML = '';
  keys.forEach(k => {
    const div = document.createElement('div');
    div.className = 'key-card';
    const expires = k.expires_at ? `Истекает ${fmtDate(k.expires_at)}` : 'Бессрочный';
    const lastUsed = k.last_used_at ? `Последнее использование: ${fmtDateFull(k.last_used_at)}` : 'Не использовался';
    div.innerHTML = `
      <span class="key-icon">🔑</span>
      <div class="key-info">
        <div class="key-name">${esc(k.name)}</div>
        <div class="key-prefix"><code>${k.prefix}…</code> &nbsp;·&nbsp; ${k.rate_limit_rpm} rpm</div>
        <div class="key-meta">${expires} &nbsp;·&nbsp; ${lastUsed}</div>
        ${k.permissions.length ? `<div style="margin-top:4px">${k.permissions.map(p=>`<span class="tag" style="font-size:10px">${esc(p)}</span>`).join(' ')}</div>` : ''}
      </div>
      <div class="key-actions">
        <button class="btn-danger-outline btn-xs" onclick="revokeKey('${k.id}','${esc(k.name)}')">Отозвать</button>
      </div>`;
    el.appendChild(div);
  });
}

function renderActivity(logs) {
  const el = document.getElementById('activity-list');
  if (!logs.length) { el.innerHTML = '<div class="empty">Нет записей</div>'; return; }
  el.innerHTML = logs.map(a => `
    <div class="act-row">
      <span class="act-ts">${fmtDateFull(a.timestamp)}</span>
      <span class="act-name">${esc(a.action)}</span>
      <span class="act-detail">${a.ip ? 'ip:'+a.ip+'  ' : ''}${Object.keys(a.details).length ? JSON.stringify(a.details) : ''}</span>
    </div>`).join('');
}

// ── Keys ───────────────────────────────────────────────────────────────────
function showNewKeyForm()  { document.getElementById('new-key-form').style.display = ''; }
function hideNewKeyForm()  { document.getElementById('new-key-form').style.display = 'none'; }

async function createKey() {
  const name  = document.getElementById('nk-name').value.trim() || 'default';
  const rpm   = parseInt(document.getElementById('nk-rpm').value) || 60;
  const days  = parseInt(document.getElementById('nk-days').value) || null;
  const perms = document.getElementById('nk-perms').value.split(',').map(s=>s.trim()).filter(Boolean);
  const d = await apiFetch('/dashboard/api/me/keys', {
    method: 'POST',
    body: JSON.stringify({ name, rate_limit_rpm: rpm, expires_days: days, permissions: perms }),
  });
  hideNewKeyForm();
  document.getElementById('new-key-reveal').innerHTML = `
    <div class="key-reveal">
      <div class="label">⚠ Сохраните ключ сейчас — он больше не будет показан</div>
      <code id="key-val">${d.key}</code>
      <br>
      <button class="btn-outline btn-sm copy-btn" onclick="copyKey()">Копировать</button>
      <button class="btn-xs" style="margin-left:6px" onclick="document.getElementById('new-key-reveal').innerHTML=''">Скрыть</button>
    </div>`;
  const r = await apiFetch('/dashboard/api/me');
  renderKeys(r.keys);
  toast('Ключ создан');
}

function copyKey() {
  const val = document.getElementById('key-val').textContent;
  navigator.clipboard.writeText(val).then(() => toast('Скопировано!'));
}

async function revokeKey(id, name) {
  if (!confirm(`Отозвать ключ «${name}»? Это действие необратимо.`)) return;
  await apiFetch('/dashboard/api/me/keys/' + id, { method: 'DELETE' });
  const r = await apiFetch('/dashboard/api/me');
  renderKeys(r.keys);
  toast('Ключ отозван');
}

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('ru', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtDateFull(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleString('ru', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}

// ── Boot ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('token-input').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  checkAutoLogin();
});
</script>
</body>
</html>
