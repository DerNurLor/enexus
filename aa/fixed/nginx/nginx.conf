# nginx/nginx.conf
# Единая точка входа для всего стека NCFU Schedule.
#
# Роутинг:
#   /webhook/telegram   →  bot:8001      (Telegram webhook)
#   /miniapp/*          →  miniapp:8002  (Telegram Mini App SPA + API)
#   /miniapp/auth/*     →  miniapp:8002  (Auth для Mini App)
#   /auth/*             →  backend:8000  (Auth для web-портала и REST API)
#   /graphql            →  backend:8000  (GraphQL API)
#   /dashboard/*        →  dashboard:8003 (Admin dashboard)
#   /static/*           →  backend:8000  (Аватары и статика)
#   /health             →  backend:8000
#   /*                  →  backend:8000  (REST API расписания)
#
# ИСПРАВЛЕНИЯ:
#   [F1] /auth/ больше не проксируется ТОЛЬКО на miniapp:8002.
#        Web-портал (web:3000) отправляет /auth/telegram/login на backend:8000,
#        а miniapp использует /miniapp/auth/* (отдельный prefix).
#        Разделены маршруты: /miniapp/auth/ → miniapp, /auth/ → backend.
#   [F2] /metrics теперь доступен только из Docker-сети (172.16.0.0/12).
#        Добавлен deny all для защиты от утечки метрик Prometheus.
#   [F3] Добавлен Content-Security-Policy header для dashboard.
#   [F4] Убран лишний rate limit на /health (уже access_log off).

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 2048;
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────────────
    log_format main
        '$remote_addr [$time_local] "$request" '
        '$status $body_bytes_sent "$http_referer" '
        '"$http_user_agent" "$http_x_forwarded_for" '
        'rt=$request_time uct=$upstream_connect_time uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    gzip               on;
    gzip_types         text/plain text/css application/json application/javascript
                       text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length    1000;

    # ── Security headers (применяются везде) ─────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"        always;
    add_header X-Frame-Options         "SAMEORIGIN"     always;
    add_header X-XSS-Protection        "1; mode=block"  always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Request size limits ───────────────────────────────────────────────────
    client_max_body_size    20m;
    client_body_timeout     30s;
    client_header_timeout   10s;

    # ── Docker internal DNS ───────────────────────────────────────────────────
    resolver 127.0.0.11 valid=5s ipv6=off;
    resolver_timeout 5s;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr  zone=api_limit:10m       rate=30r/m;
    limit_req_zone  $binary_remote_addr  zone=webhook_limit:1m    rate=100r/s;
    limit_req_zone  $binary_remote_addr  zone=dashboard_limit:5m  rate=60r/m;
    limit_req_zone  $binary_remote_addr  zone=auth_limit:2m       rate=10r/m;

    # ── Main server ───────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Upstream переменные — lazy DNS resolution
        set $upstream_backend   http://backend:8000;
        set $upstream_bot       http://bot:8001;
        set $upstream_miniapp   http://miniapp:8002;
        set $upstream_dashboard http://dashboard:8003;

        # Общие proxy headers
        proxy_http_version    1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";
        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;

        proxy_buffering          on;
        proxy_buffer_size        8k;
        proxy_buffers            8 16k;
        proxy_busy_buffers_size  32k;

        # ── Telegram webhook → bot ────────────────────────────────────────────
        location = /webhook/telegram {
            limit_req zone=webhook_limit burst=50 nodelay;

            if ($request_method !~ ^(POST)$ ) {
                return 405;
            }

            proxy_pass         $upstream_bot;
            proxy_read_timeout 30s;
            proxy_set_header X-Telegram-Bot-Api-Secret-Token $http_x_telegram_bot_api_secret_token;
        }

        # ── Dashboard (отдельный сервис :8003) ───────────────────────────────
        location = /dashboard {
            return 301 /dashboard/;
        }

        location /dashboard/ {
            limit_req zone=dashboard_limit burst=20 nodelay;

            proxy_pass         $upstream_dashboard;
            proxy_read_timeout 120s;

            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header X-Frame-Options "DENY" always;
            # [F3] CSP для dashboard — запрещаем inline scripts и внешние фреймы
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; frame-ancestors 'none';" always;
        }

        # ── [F1] Mini App Auth — ОТДЕЛЬНЫЙ маршрут для miniapp:8002 ──────────
        # Mini App отправляет auth-запросы на /miniapp/auth/*
        # Web-портал отправляет на /auth/* → backend:8000 (см. ниже)
        location /miniapp/auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass         $upstream_miniapp;
            proxy_read_timeout 30s;
        }

        # ── Mini App SPA ──────────────────────────────────────────────────────
        location /miniapp/ {
            proxy_pass         $upstream_miniapp;
            proxy_read_timeout 30s;
        }

        # ── [F1] Auth для web-портала и REST API → backend:8000 ──────────────
        # Web-портал (Next.js) использует /auth/telegram/login, /auth/refresh, /auth/me
        # которые реализованы в backend/app/auth/router.py
        location /auth/ {
            limit_req zone=auth_limit burst=10 nodelay;

            proxy_pass         $upstream_backend;
            proxy_read_timeout 30s;
        }

        # ── GraphQL API ───────────────────────────────────────────────────────
        location /graphql {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass        $upstream_backend;
            proxy_set_header  Upgrade    $http_upgrade;
            proxy_set_header  Connection "upgrade";
            proxy_read_timeout 300s;
        }

        # ── Static files (аватары) ────────────────────────────────────────────
        location /static/ {
            proxy_pass $upstream_backend;

            proxy_hide_header  Cache-Control;
            add_header         Cache-Control "public, max-age=86400, immutable" always;
            add_header         Vary "Accept-Encoding" always;

            proxy_read_timeout 15s;
        }

        # ── Health check ──────────────────────────────────────────────────────
        location = /health {
            access_log off;
            proxy_pass $upstream_backend;
        }

        # ── Metrics (только из Docker-сети) ───────────────────────────────────
        # [F2] Ограничен доступ — только внутренние Docker-сети
        location = /metrics {
            # Разрешаем только localhost и Docker internal networks
            allow 127.0.0.1;
            allow 172.16.0.0/12;   # Docker overlay networks
            allow 10.0.0.0/8;      # Docker bridge networks
            deny  all;
            access_log off;
            proxy_pass $upstream_backend;
        }

        # ── REST API (расписание) — всё остальное → backend ──────────────────
        location / {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass $upstream_backend;
        }
    }
}
