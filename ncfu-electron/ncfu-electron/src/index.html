<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>НЦФУ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:       #0a0a0a;
      --surface:  #111111;
      --border:   rgba(255,255,255,0.08);
      --cyan:     #5ce1e6;
      --cyan-dim: rgba(92,225,230,0.1);
      --t-primary:   #ffffff;
      --t-secondary: rgba(255,255,255,0.6);
      --t-muted:     rgba(255,255,255,0.3);
      --titlebar-h:  38px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--t-primary);
      font-family: -apple-system, 'Outfit', 'Segoe UI', sans-serif;
      overflow: hidden;
      user-select: none;
    }

    /* ── Titlebar ── */
    #titlebar {
      height: var(--titlebar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      -webkit-app-region: drag;
      position: relative;
      z-index: 100;
    }

    #titlebar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 14px;
      -webkit-app-region: no-drag;
    }

    #titlebar .logo-icon {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      background: var(--cyan-dim);
      border: 1px solid rgba(92,225,230,0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }

    #titlebar .logo-text {
      font-size: 12px;
      font-weight: 600;
      color: var(--t-primary);
      letter-spacing: 0.05em;
    }

    #titlebar .spacer { flex: 1; }

    /* Nav tabs */
    #titlebar .nav {
      display: flex;
      align-items: center;
      gap: 2px;
      -webkit-app-region: no-drag;
    }

    #titlebar .nav-btn {
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      color: var(--t-secondary);
      cursor: pointer;
      border: none;
      background: none;
      transition: all 0.15s;
    }

    #titlebar .nav-btn:hover { background: rgba(255,255,255,0.06); color: var(--t-primary); }
    #titlebar .nav-btn.active { background: var(--cyan-dim); color: var(--cyan); }

    /* Traffic-light style on mac, or custom buttons */
    #titlebar .win-controls {
      display: flex;
      align-items: center;
      -webkit-app-region: no-drag;
      margin-left: 8px;
    }

    .win-btn {
      width: 34px;
      height: var(--titlebar-h);
      border: none;
      background: none;
      color: var(--t-muted);
      cursor: pointer;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .win-btn:hover { background: rgba(255,255,255,0.07); color: var(--t-primary); }
    .win-btn.close:hover { background: #e81123; color: #fff; }

    /* ── Loading bar ── */
    #loading-bar {
      position: absolute;
      top: var(--titlebar-h);
      left: 0;
      height: 2px;
      width: 0%;
      background: var(--cyan);
      transition: width 0.3s ease;
      z-index: 200;
      pointer-events: none;
    }

    #loading-bar.animating {
      animation: loadpulse 1.5s ease-in-out infinite;
    }

    @keyframes loadpulse {
      0%   { width: 0%;   opacity: 1; }
      60%  { width: 85%;  opacity: 1; }
      100% { width: 95%;  opacity: 0.5; }
    }

    /* ── WebView ── */
    #webview-container {
      position: absolute;
      top: var(--titlebar-h);
      left: 0; right: 0; bottom: 0;
    }

    webview {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Offline screen ── */
    #offline {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 16px;
      color: var(--t-muted);
    }

    #offline.show { display: flex; }

    #offline svg { opacity: 0.4; }

    #offline p { font-size: 14px; }

    #offline button {
      padding: 8px 20px;
      border-radius: 8px;
      background: var(--cyan-dim);
      border: 1px solid rgba(92,225,230,0.3);
      color: var(--cyan);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.15s;
    }

    #offline button:hover { background: rgba(92,225,230,0.2); }

    /* platform: mac — move controls to left */
    body.platform-darwin #titlebar .win-controls { display: none; }
    body.platform-darwin #titlebar .logo { padding-left: 80px; }
  </style>
</head>
<body>

  <!-- Titlebar -->
  <div id="titlebar">
    <div class="logo">
      <div class="logo-icon">🎓</div>
      <span class="logo-text">НЦФУ</span>
    </div>

    <div class="nav" id="nav">
      <button class="nav-btn active" data-path="/schedule">Расписание</button>
      <button class="nav-btn" data-path="/profile">Профиль</button>
    </div>

    <div class="spacer"></div>

    <div class="win-controls">
      <button class="win-btn" id="btn-minimize" title="Свернуть">
        <svg width="10" height="1" viewBox="0 0 10 1"><rect width="10" height="1" fill="currentColor"/></svg>
      </button>
      <button class="win-btn" id="btn-maximize" title="Развернуть">
        <svg width="10" height="10" viewBox="0 0 10 10"><rect width="10" height="10" rx="1" fill="none" stroke="currentColor" stroke-width="1"/></svg>
      </button>
      <button class="win-btn close" id="btn-close" title="Закрыть">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <line x1="0" y1="0" x2="10" y2="10" stroke="currentColor" stroke-width="1.3"/>
          <line x1="10" y1="0" x2="0" y2="10" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Loading bar -->
  <div id="loading-bar"></div>

  <!-- WebView container -->
  <div id="webview-container">
    <webview
      id="wv"
      src="https://app.enexus.isabelline.xyz/schedule"
      partition="persist:ncfu"
      allowpopups="false"
    ></webview>

    <div id="offline">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M1 1l22 22M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/>
      </svg>
      <p>Нет подключения к интернету</p>
      <button id="reload-btn">Повторить</button>
    </div>
  </div>

  <script>
    const APP_URL = 'https://app.enexus.isabelline.xyz'
    const wv      = document.getElementById('wv')
    const bar     = document.getElementById('loading-bar')
    const offline = document.getElementById('offline')
    const nav     = document.getElementById('nav')

    // Platform class
    if (navigator.userAgent.includes('Macintosh')) {
      document.body.classList.add('platform-darwin')
    }

    // ── Window controls ──
    document.getElementById('btn-minimize').addEventListener('click', () => window.electronAPI.minimize())
    document.getElementById('btn-maximize').addEventListener('click', () => window.electronAPI.maximize())
    document.getElementById('btn-close').addEventListener('click',    () => window.electronAPI.close())

    // ── Nav tabs ──
    nav.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        navigate(btn.dataset.path)
      })
    })

    function navigate(path) {
      wv.loadURL(APP_URL + path)
    }

    function setActiveNav(url) {
      nav.querySelectorAll('.nav-btn').forEach(btn => {
        const active = url.includes(btn.dataset.path)
        btn.classList.toggle('active', active)
      })
    }

    // ── WebView events ──
    wv.addEventListener('did-start-loading', () => {
      bar.classList.add('animating')
      offline.classList.remove('show')
      wv.style.display = 'block'
    })

    wv.addEventListener('did-stop-loading', () => {
      bar.classList.remove('animating')
      bar.style.width = '100%'
      setTimeout(() => { bar.style.width = '0%' }, 300)
    })

    wv.addEventListener('did-navigate', (e) => {
      setActiveNav(e.url)
    })

    wv.addEventListener('did-navigate-in-page', (e) => {
      setActiveNav(e.url)
    })

    wv.addEventListener('did-fail-load', (e) => {
      if (e.errorCode === -3) return // aborted
      bar.classList.remove('animating')
      bar.style.width = '0%'
      wv.style.display = 'none'
      offline.classList.add('show')
    })

    // Open external links in browser
    wv.addEventListener('new-window', (e) => {
      window.electronAPI.openExternal(e.url)
    })

    // ── Reload button ──
    document.getElementById('reload-btn').addEventListener('click', () => {
      offline.classList.remove('show')
      wv.style.display = 'block'
      wv.reload()
    })

    // ── Navigate from tray menu ──
    window.electronAPI.onNavigate((path) => navigate(path))

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', (e) => {
      if (e.key === 'F5' || (e.ctrlKey && e.key === 'r')) wv.reload()
      if (e.ctrlKey && e.key === 'ArrowLeft') wv.goBack()
      if (e.ctrlKey && e.key === 'ArrowRight') wv.goForward()
      if (e.key === 'F12') wv.openDevTools()
    })
  </script>
</body>
</html>
